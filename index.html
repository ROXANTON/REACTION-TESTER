<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Your Eyespeed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">TEST YOUR EYESPEED</h1>

  <div class="glass-box">
    <h2>Are you ready?</h2>

    <div class="lights">
      <div id="red" class="light"></div>
      <div id="yellow" class="light"></div>
      <div id="green" class="light"></div>
    </div>

    <div id="message" class="message">Wait for green...</div>

    <div id="result" class="result-box">-- ms</div>

    <button id="startBtn" type="button">START</button>
    <button id="spaceBtn" type="button">PRESS SPACEBAR</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
